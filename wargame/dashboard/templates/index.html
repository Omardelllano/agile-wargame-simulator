<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agile Wargame Simulator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div id="app">

  <!-- ===== Header ===== -->
  <header>
    <h1>⚔ Agile Wargame Simulator</h1>
    <span class="version">v0.1.0</span>
    <span style="flex:1"></span>
    <span id="status-badge" class="status-idle">IDLE</span>
  </header>

  <!-- ===== Main 3-column layout ===== -->
  <div class="main-content">

    <!-- ── Left: Config + Friction + Agent Grid ── -->
    <div class="panel">
      <div class="panel-title">Configuration</div>

      <div class="field">
        <label for="sel-provider">Provider</label>
        <select id="sel-provider">
          <option value="mock">mock (deterministic)</option>
          <option value="gemini-free">gemini-free</option>
          <option value="deepseek">deepseek</option>
          <option value="openai">openai</option>
        </select>
      </div>

      <div class="field">
        <label for="sel-scenario">Scenario</label>
        <select id="sel-scenario">
          <option value="seeds/etp">etp (default)</option>
        </select>
      </div>

      <div class="field">
        <label for="inp-sprints">Sprints</label>
        <input type="number" id="inp-sprints" min="1" max="20" value="2" />
      </div>

      <button id="btn-run" class="btn">▶ RUN SIMULATION</button>

      <!-- Friction gauge -->
      <div class="gauge-wrap">
        <div class="gauge-label">
          <span>Friction Index</span>
          <span><span id="gauge-val">0</span>%</span>
        </div>
        <div class="gauge-bar-bg">
          <div class="gauge-bar-fill" id="gauge-fill"></div>
        </div>
      </div>

      <!-- Agent cards -->
      <div class="panel-title" style="margin-top:14px;">Agent Status</div>
      <div class="agent-grid" id="agent-grid">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- ── Center: Tab bar + Log | Graph ── -->
    <div class="center-panel">
      <div class="log-header" id="current-sprint">Waiting to start…</div>

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-log">Simulation Log</button>
        <button class="tab-btn"        id="tab-graph">Agent Graph</button>
      </div>

      <!-- Simulation Log panel -->
      <div id="panel-log" class="tab-content">
        <div class="turn-log">
          <table>
            <thead>
              <tr>
                <th class="col-sprint">Sprint</th>
                <th class="col-turn">Turn</th>
                <th class="col-agent">Agent</th>
                <th class="col-action">Action</th>
                <th class="col-conf">Conf</th>
                <th class="col-rat">Rationale</th>
              </tr>
            </thead>
            <tbody id="log-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Agent Graph panel -->
      <div id="panel-graph" class="tab-content" style="display:none;">
        <div id="graph-container"></div>
      </div>
    </div>

    <!-- ── Right: God Agent report ── -->
    <div class="report-panel">
      <div class="panel-title">God Agent Report</div>
      <div id="report-update-indicator" class="report-update-indicator"></div>
      <div class="sprint-tabs" id="report-tabs"></div>
      <div id="report-content">
        <p class="empty-state">Sprint reports will appear here after each sprint completes.</p>
      </div>
    </div>

  </div><!-- /main-content -->
</div><!-- /app -->

<!-- Edge tooltip -->
<div id="graph-tooltip"></div>

<!-- D3 v7 (must load before graph.js) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>

<script src="/static/graph.js"></script>
<script src="/static/dashboard.js"></script>
</body>
</html>
